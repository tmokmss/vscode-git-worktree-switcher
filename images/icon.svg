<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F5F7"/>
      <stop offset="100%" stop-color="#E0E0E5"/>
    </linearGradient>
    <linearGradient id="folderActive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
    <linearGradient id="folderIdle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#607D8B"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- back folder (idle) -->
  <g transform="translate(20 28)" opacity="0.5">
    <path d="M0 8 Q0 2 6 2 L22 2 L28 8 L62 8 Q68 8 68 14 L68 50 Q68 56 62 56 L6 56 Q0 56 0 50 Z" fill="url(#folderIdle)" stroke="#F5F5F7" stroke-width="2"/>
  </g>

  <!-- middle folder (idle) -->
  <g transform="translate(28 40)" opacity="0.5">
    <path d="M0 8 Q0 2 6 2 L22 2 L28 8 L62 8 Q68 8 68 14 L68 50 Q68 56 62 56 L6 56 Q0 56 0 50 Z" fill="url(#folderIdle)" stroke="#F5F5F7" stroke-width="2"/>
  </g>

  <!-- front folder (active) -->
  <g transform="translate(36 52)">
    <path d="M0 8 Q0 2 6 2 L22 2 L28 8 L62 8 Q68 8 68 14 L68 50 Q68 56 62 56 L6 56 Q0 56 0 50 Z" fill="url(#folderActive)" stroke="#F5F5F7" stroke-width="2"/>
    <!-- branch icon inside -->
    <g transform="translate(18 18)" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <line x1="6" y1="4" x2="6" y2="28"/>
      <circle cx="6" cy="4" r="3.2" fill="#FFFFFF"/>
      <circle cx="6" cy="28" r="3.2" fill="#FFFFFF"/>
      <circle cx="26" cy="16" r="3.2" fill="#FFFFFF"/>
      <path d="M6 14 Q6 16 26 16"/>
    </g>
  </g>

  <!-- swap arrows top-right (larger, higher contrast) -->
  <g transform="translate(76 10)" fill="none" stroke="#1A2327" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 10 L30 10"/>
    <polyline points="24,4 30,10 24,16"/>
    <path d="M30 24 L2 24"/>
    <polyline points="8,18 2,24 8,30"/>
  </g>
</svg>
