# Release pipeline driven by semantic-release.
#
# Flow:
#   1. Every push to main runs semantic-release. It scans commits since
#      the last v* tag.
#   2. Bump type is derived from those commit messages (see .releaserc.json):
#        - BREAKING CHANGE → major
#        - feat: → minor
#        - any other type (fix/refactor/chore/docs/...) → patch
#   3. semantic-release bumps package.json *in-CI only* (not committed back),
#      builds the .vsix, publishes to the VS Code Marketplace via OIDC,
#      then creates the git tag and GitHub Release with auto-generated notes.
#
# Tests run in ci.yml on every push and PR; releases are cut from green main.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
