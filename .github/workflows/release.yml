# Release pipeline driven by release-please.
#
# Flow:
#   1. Every push to main runs release-please. It scans Conventional Commits
#      since the last release.
#   2. If there are releasable commits (feat/fix/perf/revert/breaking),
#      release-please maintains a "release PR" on a branch
#      `release-please--branches--main` containing:
#        - bumped package.json version
#        - updated CHANGELOG.md with categorized entries
#   3. Merging the release PR causes the next run to create:
#        - a git tag (vX.Y.Z)
#        - a GitHub Release with CHANGELOG-derived notes
#   4. When a release is created in step 3, the `publish` job below fires
#      and pushes the .vsix to the VS Code Marketplace via OIDC.
#
# Tests are NOT run here — they run in ci.yml on every push and PR. Releases
# are expected to be cut from green main.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run package

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --azure-credential
